def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

apply plugin: 'com.android.library'

android {
    compileSdkVersion safeExtGet('compileSdkVersion', 34)

    defaultConfig {
        minSdkVersion safeExtGet('minSdkVersion', 23)
        targetSdkVersion safeExtGet('targetSdkVersion', 34)
        versionCode 1
        versionName "1.0"
    }

    // React Native 0.83 uses Java 17 toolchain by default.
    // The library sources are Java-only and compatible with 17.
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // React Native 0.83 Android artifact
    implementation "com.facebook.react:react-android"

    // AirGap Sapling Android wrapper (Java 17 compatible).
    // Exclude Kotlin stdlib so the parent project's Kotlin version is used and we avoid
    // "Module was compiled with an incompatible version of Kotlin" (e.g. 2.3.0 vs 2.1.0).
    implementation('com.github.airgap-it:airgap-sapling:0.0.7-android-16kb') {
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib'
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
    }
}
